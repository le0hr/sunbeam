version: '3.8'

services:
  db:
    image: mariadb:10.6
    container_name: wp_shop_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    container_name: wp_shop_app
    restart: always
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_DB_NAME: wordpress
    volumes:
      # Прокидаємо папку wp-content локально, щоб редагувати код у VS Code
      - ./wp-content:/var/www/html/wp-content

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
    # Замінити посилання на базове посилання API
      - NEXT_PUBLIC_WOO_API_URL=https://api.yourstore.com  
    depends_on:
      - woo


volumes:
  db_data:
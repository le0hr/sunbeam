version: '3.8'

services:
  db:
    image: mariadb:10.6
    container_name: wp_shop_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  wordpress:
    image: wordpress:latest
    container_name: wp_shop_app
    restart: always
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        # 1. Визначаємо поточний хост запиту
        $$my_host = $$_SERVER['HTTP_HOST'] ?? 'localhost';
        
        # 2. Якщо запит йде від FastAPI (внутрішня мережа Docker)
        if ($$my_host === 'wp_shop_app' || strpos($$my_host, '172.') === 0) {
            define('WP_HOME', 'http://' . $$my_host);
            define('WP_SITEURL', 'http://' . $$my_host);
            $$_SERVER['HTTPS'] = 'off';
            define('FORCE_SSL_ADMIN', false);
        } else {
            # 3. Якщо запит йде ззовні через Nginx
            $$is_https = ( !empty($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https' );
            
            if ($$is_https) {
                $$_SERVER['HTTPS'] = 'on';
                define('WP_HOME', 'https://sunbeambe.com');
                define('WP_SITEURL', 'https://sunbeambe.com');
            } else {
                define('WP_HOME', 'http://sunbeambe.com');
                define('WP_SITEURL', 'http://sunbeambe.com');
                define('FORCE_SSL_ADMIN', false);
            }
        }

        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('WP_DISABLE_FATAL_ERROR_HANDLER', true);
        @ini_set('display_errors', 0);
        @ini_set('log_errors', 1);
        error_reporting(E_ALL);
        define('WC_LOG_HANDLER', 'WC_Log_Handler_File');
    volumes:
      - wp-content:/var/www/html/wp-content
    networks:
      - app-network
    ports:
      - "8080:80"
  backend:
    build: 
      context: ./backend
      dockerfile: ./Dockerfile
    container_name: fastapi_backend
    restart: always
    volumes:
      - ./backend:/app # Монтуємо код для hot-reload під час розробки
    env_file:
      - .env
    networks:
      - app-network
    expose: 
      - "8000"

  agent:
    build:
      context: ./backend/sync-bot
      dockerfile: Dockerfile
    container_name: supplier_agent
    env_file:
      - .env
    volumes:
      - ./backend/sync-bot:/app
    depends_on:
      - backend
    networks:
      - app-network
    profiles:
      - manual
  

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: nginx
    ports:
      - "80:80" 
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    depends_on:
      - wordpress
      - backend
    networks:
      - app-network
    restart: always
    
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    restart: always

volumes:
  db_data:
  wp_data:
  certbot-etc:
  certbot-var:
  webroot:
  wp-content:

networks:
  app-network:
    driver: bridge
